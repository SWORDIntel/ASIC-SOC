# ASIC-SOC EDR default rules.
# Format: key=value, one value per line.
# Detection rules also accept key=value,severity where severity is info, warn,
# or critical. Later duplicate rules override earlier duplicate severities.
# Disable built-in/default rules with disable_<rule_key>=value or
# disable_rule_id=<rule_id>. Override severity with rule_severity=<rule_id>,<severity>.

# Suppress identical repeated findings within this many seconds. Set to 0 for
# diagnostic captures where every finding should be emitted independently.
dedup_window_seconds=5

# Minimum finding severity to emit in normal mode: info, warn, or critical.
# --all-events still emits raw telemetry for short diagnostic captures.
min_severity=warn

suspicious_exec_exact=bash
suspicious_exec_exact=sh
suspicious_exec_exact=dash
suspicious_exec_exact=zsh
suspicious_exec_exact=curl
suspicious_exec_exact=wget
suspicious_exec_exact=nc
suspicious_exec_exact=ncat
suspicious_exec_exact=socat
suspicious_exec_exact=pkexec
suspicious_exec_exact=sudo

suspicious_exec_prefix=python
suspicious_exec_prefix=perl
suspicious_exec_prefix=ruby

sensitive_read=/etc/shadow
sensitive_read=/etc/sudoers
sensitive_read=/etc/ssh/
sensitive_read=/root/.ssh/
sensitive_read=/.ssh/id_rsa
sensitive_read=/.ssh/id_ed25519
sensitive_read=/proc/kcore

sensitive_write=/etc/passwd
sensitive_write=/etc/group
sensitive_write=/etc/shadow
sensitive_write=/etc/sudoers
sensitive_write=/etc/ssh/
sensitive_write=/root/.ssh/
sensitive_write=/.ssh/
sensitive_write=/etc/systemd/system/
sensitive_write=/etc/cron.
sensitive_write=/etc/crontab

jit_allow_comm=node
jit_allow_comm=chrome
jit_allow_comm=chromium
jit_allow_comm=firefox
jit_allow_comm=java

suspicious_port=1337
suspicious_port=4444
suspicious_port=5555
suspicious_port=6666
suspicious_port=6667
suspicious_port=31337
